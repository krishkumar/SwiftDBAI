name: SwiftDBAIDemo
options:
  bundleIdPrefix: com.swiftdbai.demo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
packages:
  SwiftDBAI:
    path: ../..
targets:
  SwiftDBAIDemo:
    type: application
    platform: iOS
    sources:
      - SwiftDBAIDemo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftdbai.demo
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_GENERATION: true
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - package: SwiftDBAI
